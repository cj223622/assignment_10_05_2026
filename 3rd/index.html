<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="watermark">GAME</div>
    <div class="side-watermark">SQUID</div>

    <header class="header">
        <div class="logo-small">
            <img src="logo (2).png" alt="">
        </div>
        <nav class="nav">
            <a href="#">About</a>
            <a href="#" class="active">Watch now</a>
            <a href="#">Actors</a>
            <a href="#">Contact</a>
        </nav>
        <div class="menu-icon">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar short"></div>
        </div>
    </header>

    <main class="main-content">
        <div class="left-section">
            <div class="main-logo-container">
                <img src="Adobe Express - file.png " alt="">
            </div>

            <p class="description">
                Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
                Season 1: 9 Episodes
            </p>

            <div class="action-buttons">
                <a href="#" class="btn play-btn">
                    <div class="play-circle">
                        <div class="play-triangle"></div>
                    </div>
                    Play Now
                </a>
                <a href="#" class="btn trailer-btn">
                    <div class="trailer-play"></div>
                    Watch Trailer
                </a>
            </div>
        </div>

        <div class="middle-section">
            <div class="scroll-indicator">
                <span class="scroll-text">SCROLL</span>
                <div class="scroll-line"></div>
            </div>
        </div>

        <div class="right-section">
            <div class="guard-container">
                <img src="main person.png"
                    alt="Squid Game Guard" class="guard-image">
            </div>
            <div class="social-icons">
                <a href="#" class="social-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <path
                            d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z">
                        </path>
                    </svg>
                </a>
                <a href="#" class="social-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
                <a href="#" class="social-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                    </svg>
                </a>
            </div>
        </div>
    </main>

    <footer class="thumbnails">
        <div class="thumbnails-container">
            <div class="thumbnail-card">
                <img src="Gemini_Generated_Image_qr2fgkqr2fgkqr2f.png"
                    alt="Scene 1" class="thumb-img">
                <div class="play-overlay">
                    <div class="play-triangle-small"></div>
                </div>
            </div>
            <div class="thumbnail-card active-thumb">
                <img src="2.png"
                    alt="Scene 2" class="thumb-img">
                <div class="play-overlay">
                    <div class="play-triangle-small"></div>
                </div>
            </div>
            <div class="thumbnail-card">
                <img src="Gemini_Generated_Image_qr2fgkqr2fgkqr2f.png"
                    alt="Scene 3" class="thumb-img">
                <div class="play-overlay">
                    <div class="play-triangle-small"></div>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
